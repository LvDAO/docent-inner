services:
  redis:
    image: redis:alpine
    environment:
      DOCENT_REDIS_PASSWORD: ${DOCENT_REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$DOCENT_REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$DOCENT_REDIS_PASSWORD"
        fi
        exec redis-server
    ports:
      - "${DOCENT_DATA_BIND_ADDRESS:-127.0.0.1}:${DOCENT_REDIS_PORT:-6379}:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ -n "$$DOCENT_REDIS_PASSWORD" ]; then
            redis-cli --no-auth-warning -a "$$DOCENT_REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${DOCENT_PG_USER:-docent_user}
      POSTGRES_PASSWORD: ${DOCENT_PG_PASSWORD:-docent_password}
      POSTGRES_DB: ${DOCENT_PG_DATABASE:-docent_db}
    ports:
      - "${DOCENT_DATA_BIND_ADDRESS:-127.0.0.1}:${DOCENT_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
